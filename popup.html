<!DOCTYPE html>
<html>
<head>
  <title>NCD Panel</title>
</head>
<body style="width:200px; text-align:center; font-family:Arial;">

<h3>🩺 NCD Panel</h3>

<button onclick="load()">📊 Load</button><br><br>
<button onclick="next()">▶ Next</button>

<script>
function load(){
    window.postMessage({action:"LOAD"}, "*");
}

function next(){
    window.postMessage({action:"NEXT"}, "*");
}
</script>

</body>
</html>
