<!DOCTYPE html>
<html>
<body style="width:200px;text-align:center;">

<h3>NCD TEST</h3>

<button id="start">START TEST</button>

<script>

document.getElementById("start").onclick = async () => {

    let [tab] = await chrome.tabs.query({
        active: true,
        currentWindow: true
    });

    chrome.tabs.sendMessage(tab.id, {
        action: "START"
    });
};

</script>

</body>
</html>
