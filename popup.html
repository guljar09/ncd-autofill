<!DOCTYPE html>
<html>
<head>
  <title>NCD Stable Panel</title>
</head>
<body style="width:220px; text-align:center; font-family:Arial;">

<h3>🩺 NCD Stable</h3>

<button onclick="load()">📊 Load</button><br><br>
<button onclick="next()">▶ Next</button>

<script>
function load(){
    window.postMessage({action:"LOAD_NCD"}, "*");
}

function next(){
    window.postMessage({action:"NEXT_NCD"}, "*");
}
</script>

</body>
</html>
